[pytest]
asyncio_mode = auto
testpaths = tests
env =
    DATABASE_URL=postgresql+asyncpg://medagent:medagent_secret@localhost:5432/medagent_test
    DATABASE_URL_SYNC=postgresql://medagent:medagent_secret@localhost:5432/medagent_test
    SECRET_KEY=test-secret-key-that-is-long-enough-32chars
    ANTHROPIC_API_KEY=test-key
    MINIO_ACCESS_KEY=test-minio
    MINIO_SECRET_KEY=test-minio-secret
    MINIO_ENDPOINT=localhost:9000
    CORS_ORIGINS=["http://localhost:3000"]
    ALLOWED_EXTENSIONS=["pdf","png","jpg","jpeg","txt","docx"]
